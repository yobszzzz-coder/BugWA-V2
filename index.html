<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bug WA By YobszX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#121217',
                        darker: '#0a0a0e',
                        redneon: '#ff002b',
                        purple: '#b400ff',
                        pinkneon: '#ff00cc',
                        grayneon: '#1e1e26',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow { text-shadow: 0 0 8px #ff002b; }
            .border-glow { border: 1px solid #ff002b30; }
            .bg-blur { background: rgba(18, 18, 23, 0.85); backdrop-filter: blur(8px); }
            .video-cover { object-fit: cover; width: 100%; height: 100%; }
            .video-wrapper {
                box-shadow: 0 0 20px #b400ff, 0 0 40px #ff00cc, inset 0 0 15px #b400ff;
                border-radius: 0.75rem;
                overflow: hidden;
            }
            .video-terang {
                filter: brightness(1.0) contrast(1.1) saturate(1.3);
            }
            .lapisan-warna {
                background: linear-gradient(45deg, rgba(180, 0, 255, 0.2), rgba(255, 0, 204, 0.2));
                mix-blend-mode: screen;
            }
        }
        .tombol-admin {
            display: block;
            width: 100%;
            background-color: #ff002b;
            color: #ffffff;
            font-weight: bold;
            text-align: center;
            padding: 12px 0;
            border-radius: 8px;
            font-size: 15px;
            text-decoration: none;
            margin-top: 15px;
            transition: background 0.3s ease;
        }
        .tombol-admin:hover {
            background-color: #128C7E;
        }
        .tombol-admin i {
            margin-right: 8px;
            font-size: 17px;
        }
        /* Keamanan: mencegah salin, klik kanan, blok teks */
        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        video, img { pointer-events: none; }
        body { -webkit-touch-callout: none; }
    </style>
</head>
<body class="bg-darker text-gray-200 font-sans min-h-screen">

    <!-- TOMBOL LOGIN / LOGOUT -->
    <div id="btnArea" class="fixed top-3 right-3 z-40">
        <div id="btnLoginArea" class="flex items-center gap-1.5 cursor-pointer bg-blur border-glow px-2.5 py-1.5 rounded-md hover:shadow-[0_0_8px_#ff002b25] transition-all duration-200" onclick="bukaLogin()">
            <i class="fa fa-user-circle-o text-redneon text-lg"></i>
            <span class="text-[11px] font-medium">Login To VIP Bug</span>
        </div>
        <div id="btnLogoutArea" class="hidden flex items-center gap-1.5 cursor-pointer bg-blur border-glow px-2.5 py-1.5 rounded-md hover:shadow-[0_0_8px_#ff002b25] transition-all duration-200" onclick="aksiLogout()">
            <i class="fa fa-sign-out text-redneon text-lg"></i>
            <span class="text-[11px] font-medium">LOGOUT</span>
        </div>
    </div>

    <!-- HALAMAN LOGIN (POPUP) -->
    <div id="loginPopup" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-darker/90">
        <div class="w-full max-w-sm bg-blur p-7 rounded-lg border-glow shadow-xl relative">
            <button onclick="tutupLogin()" class="absolute top-2 right-2 text-gray-400 hover:text-redneon">
                <i class="fa fa-times"></i>
            </button>
            <div class="text-center mb-5">
                <i class="fa fa-user-circle-o text-redneon text-4xl mb-1"></i>
                <h2 class="text-lg font-bold text-white">Login⚔️</h2>
                <p class="text-xs text-gray-400">Masuk ke Panel VIP Bug WA</p>
            </div>
            <div class="space-y-3.5">
                <div>
                    <label class="block text-xs mb-1 text-gray-300">Username</label>
                    <input type="text" id="user" class="w-full px-3 py-2 rounded bg-grayneon border border-grayneon focus:border-redneon outline-none text-sm" placeholder="Username">
                </div>
                <div>
                    <label class="block text-xs mb-1 text-gray-300">Password</label>
                    <input type="password" id="pass" class="w-full px-3 py-2 rounded bg-grayneon border border-grayneon focus:border-redneon outline-none text-sm" placeholder="Password">
                </div>
                <button id="btnLogin" class="w-full bg-redneon hover:bg-red-700 text-white py-2 rounded font-medium text-sm transition-shadow hover:shadow-[0_0_10px_#ff002b35]">
                    Login
                </button>
            </div>
        </div>
    </div>

    <!-- HALAMAN UTAMA -->
    <div id="mainPage" class="container mx-auto px-5 py-10 max-w-md">
        <!-- HEADER DENGAN VIDEO DI BELAKANG + EFEK UNGU & PINK -->
        <div class="text-center mb-10 mt-4 video-wrapper relative">
            <video autoplay loop muted playsinline class="video-cover video-terang absolute top-0 left-0 z-0">
                <source src="m.mp4" type="video/mp4">
                Browser kamu tidak mendukung video.
            </video>
            <div class="absolute inset-0 lapisan-warna z-10"></div>
            <div class="relative z-20 py-8">
                <h1 class="text-[clamp(1.7rem,5vw,2.4rem)] font-extrabold text-redneon text-shadow tracking-wide">Bug WhatsApp</h1>
                <p class="text-base text-gray-200 mt-1 font-medium">By YobszX</p>
            </div>
        </div>

        <!-- BAGIAN FITUR BUG -->
        <div id="fiturBug" class="bg-dark rounded-xl border border-redneon/20 p-5 shadow-[0_0_20px_#ff002b0f] mb-7">
            <div class="mb-5">
                <label class="block text-sm font-medium text-gray-300 mb-2">Nomor Target</label>
                <div class="relative">
                    <span class="absolute left-3 top-2.5 text-gray-500 text-sm">+62</span>
                    <input type="number" id="nomorTarget" class="w-full pl-9 pr-3 py-2.5 rounded-lg bg-grayneon border border-grayneon focus:border-redneon outline-none text-sm" placeholder="8xxxxxxxxx">
                </div>
                <p class="text-[10px] text-gray-500 mt-1">* Masukkan nomor tanpa angka '0' di depan</p>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-300 mb-3">Pilih Jenis Bug</label>
                <div class="space-y-2.5">
                    <label class="flex items-center gap-3 p-2.5 rounded-lg bg-grayneon/50 border border-grayneon cursor-pointer hover:border-redneon/40 transition">
                        <input type="radio" name="jenisBug" value="Crash APK" class="accent-redneon w-4 h-4">
                        <div>
                            <p class="font-semibold text-sm">- Crash APK</p>
                            <p class="text-[10px] text-gray-400">Menutup paksa aplikasi WA target</p>
                        </div>
                    </label>
                    <label class="flex items-center gap-3 p-2.5 rounded-lg bg-grayneon/50 border border-grayneon cursor-pointer hover:border-redneon/40 transition">
                        <input type="radio" name="jenisBug" value="Delay" class="accent-redneon w-4 h-4">
                        <div>
                            <p class="font-semibold text-sm">- Delay</p>
                            <p class="text-[10px] text-gray-400">Keterlambatan pesan & buka chat</p>
                        </div>
                    </label>
                    <label class="flex items-center gap-3 p-2.5 rounded-lg bg-grayneon/50 border border-grayneon cursor-pointer hover:border-redneon/40 transition">
                        <input type="radio" name="jenisBug" value="Super Delay" class="accent-redneon w-4 h-4">
                        <div>
                            <p class="font-semibold text-sm">- Super Delay</p>
                            <p class="text-[10px] text-gray-400">Sangat lambat, sulit membuka menu</p>
                        </div>
                    </label>
                </div>
            </div>

            <button id="btnKirim" class="w-full bg-redneon hover:bg-red-600 text-white py-3 rounded-lg font-bold text-base transition-all hover:shadow-[0_0_12px_#ff002b45] active:scale-[0.98]">
                <i class="fa fa-paper-plane mr-1.5"></i> KIRIM BUG
            </button>

            <a href="dashboard.html" class="tombol-admin">
                <i class="fa-brands fa-whatsapp"></i> Hubungi Admin Jika Bug Wa Gk Jadi...
            </a>

            <div id="statusProses" class="hidden mt-4 p-3 rounded-lg bg-green-950/20 border border-green-700/25 text-green-400 text-center">
                <i class="fa fa-check-circle text-base mb-0.5"></i>
                <p class="text-sm font-semibold">Berhasil dikirim ke: <span id="noHasil"></span></p>
                <p class="text-[10px] mt-0.5">Jenis: <span id="jenisHasil"></span></p>
            </div>
        </div>

        <!-- PANEL ADMIN -->
        <div id="panelAdmin" class="hidden bg-dark rounded-xl border border-redneon/20 p-5">
            <div class="text-center mb-5">
                <h3 class="text-lg font-bold text-redneon flex items-center justify-center gap-2">
                    <i class="fa fa-shield"></i> DATA NOMOR TARGET MASUK
                </h3>
                <p class="text-xs text-gray-400">Semua nomor yang dikirim pengguna</p>
            </div>
            <div class="text-center mb-4">
                <button id="btnHapusSemua" class="bg-red-600 hover:bg-red-800 text-white px-4 py-2 rounded-lg text-sm font-bold transition shadow-md">
                    Hapus Semua DATA
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-xs">
                    <thead>
                        <tr class="border-b border-grayneon">
                            <th class="text-left py-2 px-2 text-gray-400 rounded-tl-lg">WAKTU</th>
                            <th class="text-left py-2 px-2 text-gray-400">NOMOR</th>
                            <th class="text-left py-2 px-2 text-gray-400 rounded-tr-lg" style="width: 40%;">JENIS BUG</th>
                        </tr>
                    </thead>
                    <tbody id="isiData"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- MUSIK LATAR -->
    <audio id="laguLatar" loop preload="none" style="position:absolute; visibility:hidden; pointer-events:none;">
        <source src="Maroon 5 - Memories (Lyrics) [o2DXt11SMNI].mp" type="audio/mpeg">
    </audio>

    <!-- ======================== CUSTOM ALERT & CONFIRM MODAL ======================== -->
    <div id="customAlertModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/70 backdrop-blur-sm">
        <div class="bg-dark rounded-xl border border-redneon/40 p-6 w-80 shadow-2xl shadow-redneon/20">
            <div class="text-center">
                <i class="fa fa-exclamation-triangle text-redneon text-4xl mb-3"></i>
                <p id="alertMessage" class="text-gray-200 text-sm mb-5"></p>
                <button id="alertOkBtn" class="bg-redneon hover:bg-red-700 px-6 py-2 rounded-lg text-sm font-semibold transition">OK</button>
            </div>
        </div>
    </div>

    <div id="customConfirmModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/70 backdrop-blur-sm">
        <div class="bg-dark rounded-xl border border-redneon/40 p-6 w-80 shadow-2xl shadow-redneon/20">
            <div class="text-center">
                <i class="fa fa-question-circle text-yellow-500 text-4xl mb-3"></i>
                <p id="confirmMessage" class="text-gray-200 text-sm mb-5"></p>
                <div class="flex gap-3 justify-center">
                    <button id="confirmYesBtn" class="bg-green-600 hover:bg-green-700 px-5 py-2 rounded-lg text-sm font-semibold transition">Ya</button>
                    <button id="confirmNoBtn" class="bg-gray-600 hover:bg-gray-700 px-5 py-2 rounded-lg text-sm font-semibold transition">Tidak</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ======================== FUNGSI CUSTOM ALERT & CONFIRM ========================
        function customAlert(message) {
            return new Promise((resolve) => {
                const modal = document.getElementById('customAlertModal');
                const msgEl = document.getElementById('alertMessage');
                const okBtn = document.getElementById('alertOkBtn');
                msgEl.innerText = message;
                modal.classList.remove('hidden');
                const handleOk = () => {
                    modal.classList.add('hidden');
                    okBtn.removeEventListener('click', handleOk);
                    resolve();
                };
                okBtn.addEventListener('click', handleOk);
            });
        }

        function customConfirm(message) {
            return new Promise((resolve) => {
                const modal = document.getElementById('customConfirmModal');
                const msgEl = document.getElementById('confirmMessage');
                const yesBtn = document.getElementById('confirmYesBtn');
                const noBtn = document.getElementById('confirmNoBtn');
                msgEl.innerText = message;
                modal.classList.remove('hidden');
                const handleYes = () => {
                    modal.classList.add('hidden');
                    yesBtn.removeEventListener('click', handleYes);
                    noBtn.removeEventListener('click', handleNo);
                    resolve(true);
                };
                const handleNo = () => {
                    modal.classList.add('hidden');
                    yesBtn.removeEventListener('click', handleYes);
                    noBtn.removeEventListener('click', handleNo);
                    resolve(false);
                };
                yesBtn.addEventListener('click', handleYes);
                noBtn.addEventListener('click', handleNo);
            });
        }

        // Konfigurasi
        const ADMIN_USER = "Yobsz";
        const ADMIN_PASS = "YobszVIP";
        let isLogin = false;
        const DB_URL = "https://api.jsonbin.io/v3/b/6a03d602250b1311c340a84e";
        const DB_KEY = "$2a$10$aqLMYkJqWm8.WylItNJhZegtxIDmOmKjkiUIbiD4N8e0.A/0rc0/C";

        const loginPopup = document.getElementById('loginPopup');
        const fiturBug = document.getElementById('fiturBug');
        const panelAdmin = document.getElementById('panelAdmin');
        const btnLoginArea = document.getElementById('btnLoginArea');
        const btnLogoutArea = document.getElementById('btnLogoutArea');
        const btnLogin = document.getElementById('btnLogin');
        const btnKirim = document.getElementById('btnKirim');
        const statusProses = document.getElementById('statusProses');
        const isiData = document.getElementById('isiData');

        function bukaLogin() { loginPopup.classList.remove('hidden'); }
        function tutupLogin() { loginPopup.classList.add('hidden'); }

        // SIMPAN KE SERVER
        async function simpanDataKeServer(dataBaru) {
            try {
                const res = await axios.get(DB_URL, { headers: { "X-Master-Key": DB_KEY } });
                let semuaData = res.data.record.data || [];
                semuaData.unshift(dataBaru);
                await axios.put(DB_URL, { data: semuaData }, { 
                    headers: { "X-Master-Key": DB_KEY, "Content-Type": "application/json" } 
                });
                return true;
            } catch (e) { 
                await customAlert("⚠️ Gagal terhubung server!"); 
                return false; 
            }
        }

        // HAPUS SATU DATA
        async function hapusSatu(waktuTarget, nomorTarget) {
            const konfirm = await customConfirm("⚠️ Yakin mau hapus data ini?");
            if (!konfirm) return;
            try {
                const res = await axios.get(DB_URL, { headers: { "X-Master-Key": DB_KEY } });
                let semuaData = res.data.record.data || [];
                let dataBaru = semuaData.filter(item => !(item.waktu === waktuTarget && item.nomor === nomorTarget));
                await axios.put(DB_URL, { data: dataBaru }, { 
                    headers: { "X-Master-Key": DB_KEY, "Content-Type": "application/json" } 
                });
                muatData();
            } catch (e) {
                await customAlert("❌ Gagal menghapus!");
            }
        }

        // AMBIL DATA DARI SERVER
        async function muatData() {
            try {
                const res = await axios.get(DB_URL, { headers: { "X-Master-Key": DB_KEY } });
                let semuaData = res.data.record.data || [];
                isiData.innerHTML = "";
                if (semuaData.length === 0) {
                    isiData.innerHTML = `<tr><td colspan="3" class="py-4 px-2 text-center text-gray-500">Belum ada data nomor masuk</td></tr>`;
                    return;
                }
                semuaData.forEach(item => {
                    const baris = document.createElement('tr');
                    baris.className = "border-b border-grayneon/40 hover:bg-grayneon/20";
                    baris.innerHTML = `
                        <td class="py-2.5 px-2 text-[10px]">${item.waktu}</td>
                        <td class="py-2.5 px-2 font-mono text-redneon font-medium">${item.nomor}</td>
                        <td class="py-2.5 px-2 flex items-center justify-between">
                            <span>${item.jenis}</span>
                            <i class="fa fa-trash text-red-500 cursor-pointer hover:text-red-700" onclick="hapusSatu('${item.waktu.replace(/'/g, "\\'")}', '${item.nomor.replace(/'/g, "\\'")}')"></i>
                        </td>
                    `;
                    isiData.appendChild(baris);
                });
            } catch (e) { 
                isiData.innerHTML = `<tr><td colspan="3" class="py-4 px-2 text-center text-red-500">❌ Gagal ambil data!</td></tr>`;
            }
        }

        // LOGIN ADMIN
        btnLogin.addEventListener('click', async () => {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            if (u === ADMIN_USER && p === ADMIN_PASS) {
                isLogin = true;
                tutupLogin();
                fiturBug.classList.add('hidden');
                panelAdmin.classList.remove('hidden');
                btnLoginArea.classList.add('hidden');
                btnLogoutArea.classList.remove('hidden');
                muatData();
                setInterval(muatData, 3000);
            } else {
                await customAlert("Username atau Password salah!");
            }
        });

        // LOGOUT
        function aksiLogout() {
            isLogin = false;
            fiturBug.classList.remove('hidden');
            panelAdmin.classList.add('hidden');
            btnLoginArea.classList.remove('hidden');
            btnLogoutArea.classList.add('hidden');
            document.getElementById('user').value = "";
            document.getElementById('pass').value = "";
        }

        // KIRIM BUG
        btnKirim.addEventListener('click', async () => {
            const nomor = document.getElementById('nomorTarget').value.trim();
            const jenisTerpilih = document.querySelector('input[name="jenisBug"]:checked');
            if (!nomor || !jenisTerpilih) {
                await customAlert("Lengkapi nomor & jenis bug!");
                return;
            }
            const dataBaru = {
                waktu: new Date().toLocaleString('id-ID'),
                nomor: "+62" + nomor,
                jenis: jenisTerpilih.value
            };
            const sukses = await simpanDataKeServer(dataBaru);
            if (!sukses) return;
            document.getElementById('noHasil').textContent = "+62" + nomor;
            document.getElementById('jenisHasil').textContent = jenisTerpilih.value;
            statusProses.classList.remove('hidden');
            document.getElementById('nomorTarget').value = "";
            jenisTerpilih.checked = false;
            setTimeout(() => statusProses.classList.add('hidden'), 4000);
        });

        // HAPUS SEMUA DATA
        document.getElementById('btnHapusSemua').addEventListener('click', async () => {
            const konfirm = await customConfirm("⚠️ PERINGATAN!\nYakin mau HAPUS SEMUA DATA?\nData tidak bisa dikembalikan lagi!");
            if (!konfirm) return;
            try {
                await axios.put(DB_URL, { data: [] }, { 
                    headers: { "X-Master-Key": DB_KEY, "Content-Type": "application/json" } 
                });
                await customAlert("✅ Semua data berhasil dihapus!");
                muatData();
            } catch (e) {
                await customAlert("❌ Gagal menghapus data! Cek koneksi.");
            }
        });

        // MUSIK (tetap seperti semula)
        window.addEventListener('load', function() {
            const audio = document.getElementById('laguLatar');
            let sudahJalan = false;
            function mulaiLagu() {
                if (!sudahJalan) {
                    audio.play().then(() => {
                        sudahJalan = true;
                        document.removeEventListener('touchstart', mulaiLagu);
                        document.removeEventListener('mousemove', mulaiLagu);
                    }).catch(e => {});
                }
            }
            document.addEventListener('touchstart', mulaiLagu);
            document.addEventListener('mousemove', mulaiLagu);
        });

        // Mencegah klik kanan dan pintasan keyboard
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if(e.ctrlKey && (e.keyCode===67 || e.keyCode===85 || e.keyCode===83 || e.keyCode===80 || e.keyCode===73)) e.preventDefault();
            if(e.keyCode===123) e.preventDefault();
        });
    </script>
</body>
</html>
