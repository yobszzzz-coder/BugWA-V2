   <script>
const ADMIN_USER = "Yobsz";
const ADMIN_PASS = "YobszVIP";
let isLogin = false;

// ✅ SERVER TERPUSAT (GANTI PUNYA KAMU)
const DB_URL = "https://api.jsonbin.io/v3/b/6a03d602250b1311c340a84e";
const DB_KEY = "$2a$10$aqLMYkJqWm8.WylItNJhZegtxIDmOmKjkiUIbiD4N8e0.A/0rc0/C";

const loginPopup = document.getElementById('loginPopup');
const fiturBug = document.getElementById('fiturBug');
const panelAdmin = document.getElementById('panelAdmin');
const btnLoginArea = document.getElementById('btnLoginArea');
const btnLogoutArea = document.getElementById('btnLogoutArea');
const btnLogin = document.getElementById('btnLogin');
const btnKirim = document.getElementById('btnKirim');
const statusProses = document.getElementById('statusProses');
const isiData = document.getElementById('isiData');

// ✅ FUNGSI WAJIB (BIAR TIDAK ADA ERROR bukaLogin)
function bukaLogin() { loginPopup.classList.remove('hidden'); }
function tutupLogin() { loginPopup.classList.add('hidden'); }

// ✅ SIMPAN KE SERVER
async function simpanDataKeServer(dataBaru){
    try {
        const res = await axios.get(DB_URL, { headers: { "X-Master-Key": DB_KEY } });
        let semuaData = res.data.record.data || [];
        semuaData.unshift(dataBaru);
        await axios.put(DB_URL, { data: semuaData }, { 
            headers: { 
                "X-Master-Key": DB_KEY, 
                "Content-Type": "application/json"
            } 
        });
        return true;
    } catch (e) { 
        alert("⚠️ Gagal terhubung server!"); 
        return false; 
    }
}

// ✅ HAPUS SATU DATA SAJA
async function hapusSatu(waktuTarget, nomorTarget){
    if(!confirm("⚠️ Yakin mau hapus data ini?")) return;
    try {
        // Ambil semua data lama
        const res = await axios.get(DB_URL, { headers: { "X-Master-Key": DB_KEY } });
        let semuaData = res.data.record.data || [];
        
        // Filter: buang data yang cocok sama waktu & nomor ini
        let dataBaru = semuaData.filter(item => !(item.waktu === waktuTarget && item.nomor === nomorTarget));

        // Simpan ulang ke server (tanpa data yang dihapus)
        await axios.put(DB_URL, { data: dataBaru }, { 
            headers: { 
                "X-Master-Key": DB_KEY, 
                "Content-Type": "application/json" 
            } 
        });
        muatData(); // Segarkan tampilan
    } catch (e) {
        alert("❌ Gagal menghapus!");
    }
}


// ✅ AMBIL DATA DARI SERVER
async function muatData(){
    try {
        const res = await axios.get(DB_URL, { headers: { "X-Master-Key": DB_KEY } });
        let semuaData = res.data.record.data || [];
        isiData.innerHTML = "";

        if(semuaData.length === 0){
            isiData.innerHTML = `<tr><td colspan="3" class="py-4 px-2 text-center text-gray-500">Belum ada data nomor masuk</td></tr>`;
            return;
        }

        semuaData.forEach(item => {
            const baris = document.createElement('tr');
            baris.className = "border-b border-grayneon/40 hover:bg-grayneon/20";
            baris.innerHTML = `
    <td class="py-2.5 px-2 text-[10px]">${item.waktu}</td>
    <td class="py-2.5 px-2 font-mono text-redneon font-medium">${item.nomor}</td>
    <td class="py-2.5 px-2 flex items-center justify-between">
        <span>${item.jenis}</span>
        <i class="fa fa-trash text-red-500 cursor-pointer hover:text-red-700" onclick="hapusSatu('${item.waktu}', '${item.nomor}')"></i>
    </td>
`;

            isiData.appendChild(baris);
        });
    } catch (e) { 
        isiData.innerHTML = `<tr><td colspan="3" class="py-4 px-2 text-center text-red-500">❌ Gagal ambil data!</td></tr>`;
    }
}

// ✅ LOGIN ADMIN
btnLogin.addEventListener('click', () => {
    const u = document.getElementById('user').value.trim();
    const p = document.getElementById('pass').value.trim();
    if(u === ADMIN_USER && p === ADMIN_PASS){
        isLogin = true;
        tutupLogin();
        fiturBug.classList.add('hidden');
        panelAdmin.classList.remove('hidden');
        btnLoginArea.classList.add('hidden');
        btnLogoutArea.classList.remove('hidden');
        muatData();
        setInterval(muatData, 3000); // Auto refresh
    } else alert("Username atau Password salah!");
});

// ✅ LOGOUT
function aksiLogout() {
    isLogin = false;
    fiturBug.classList.remove('hidden');
    panelAdmin.classList.add('hidden');
    btnLoginArea.classList.remove('hidden');
    btnLogoutArea.classList.add('hidden');
    document.getElementById('user').value = "";
    document.getElementById('pass').value = "";
}

// ✅ KIRIM BUG (SUDAH DIPERBAIKI)
btnKirim.addEventListener('click', async () => {
    const nomor = document.getElementById('nomorTarget').value.trim();
    const jenisTerpilih = document.querySelector('input[name="jenisBug"]:checked');
    if(!nomor || !jenisTerpilih) {
        alert("Lengkapi nomor & jenis bug!");
        return;
    }

    const dataBaru = {
        waktu: new Date().toLocaleString('id-ID'),
        nomor: "+62" + nomor,
        jenis: jenisTerpilih.value
    };

    const sukses = await simpanDataKeServer(dataBaru);
    if(!sukses) return;

    // Tampilkan berhasil
    document.getElementById('noHasil').textContent = "+62" + nomor;
    document.getElementById('jenisHasil').textContent = jenisTerpilih.value;
    statusProses.classList.remove('hidden');
    document.getElementById('nomorTarget').value = "";
    jenisTerpilih.checked = false;
    setTimeout(() => statusProses.classList.add('hidden'), 4000);
});

// ✅ FUNGSI HAPUS SEMUA DATA DARI SERVER
document.getElementById('btnHapusSemua').addEventListener('click', async () => {
    if(!confirm("⚠️ PERINGATAN!\nYakin mau HAPUS SEMUA DATA?\nData tidak bisa dikembalikan lagi!")) return;

    try {
        // Kirim data kosong ke server (menghapus semua)
        await axios.put(DB_URL, { data: [] }, { 
            headers: { 
                "X-Master-Key": DB_KEY, 
                "Content-Type": "application/json" 
            } 
        });
        alert("✅ Semua data berhasil dihapus!");
        muatData(); // Segarkan tampilan
    } catch (e) {
        alert("❌ Gagal menghapus data! Cek koneksi.");
    }
});

 // Tunggu SEMUA isi web selesai muncul dulu, baru jalankan lagu
window.addEventListener('load', function() {
    const audio = document.getElementById('laguLatar');
    let sudahJalan = false;

    function mulaiLagu() {
        if (!sudahJalan) {
            audio.play().then(() => {
                sudahJalan = true;
                // Hapus pendeteksi agar tidak berulang
                document.removeEventListener('touchstart', mulaiLagu);
                document.removeEventListener('mousemove', mulaiLagu);
            }).catch(e => {
                // Kalau gagal, diam saja, jangan tampilkan pesan apa pun
            });
        }
    }

    // Pasang pendeteksi
    document.addEventListener('touchstart', mulaiLagu);
    document.addEventListener('mousemove', mulaiLagu);
});



</script>
